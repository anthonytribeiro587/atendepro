name: Atualizar formulário de agendamento público

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/patch-booking-errors.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Usar rota isolada e mostrar erro real
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/book/[slug]/booking-form.tsx')
          text = path.read_text(encoding='utf-8')

          text = text.replace("fetch('/api/book', {", "fetch('/api/public-booking', {")

          old = '''      if (!res.ok) throw new Error(await res.text())

      const data = await res.json()
      setClientId(data.clientId ?? null)
      setClientHasTelegram(data.hasTelegram ?? false)
      setStep('done')
      setSaving(false)
    } catch {
      setSaving(false)
      setBookingError('Something went wrong. Please try again or contact the business directly.')
    }
'''

          new = '''      const payload = await res.json().catch(() => ({
        error: 'invalid_server_response',
        message: 'O servidor retornou uma resposta inválida.',
      })) as {
        error?: string
        message?: string
        clientId?: string
        hasTelegram?: boolean
      }

      if (!res.ok) {
        setSaving(false)
        setBookingError(`${payload.message || 'Não foi possível concluir o agendamento.'}${payload.error ? ` (código: ${payload.error})` : ''}`)
        return
      }

      setClientId(payload.clientId ?? null)
      setClientHasTelegram(payload.hasTelegram ?? false)
      setStep('done')
      setSaving(false)
    } catch (error) {
      setSaving(false)
      setBookingError(`Falha de comunicação com o servidor: ${error instanceof Error ? error.message : 'erro desconhecido'}`)
    }
'''

          if old in text:
              text = text.replace(old, new)
          elif '/api/public-booking' not in text:
              raise SystemExit('Não foi possível localizar o trecho do formulário para atualização.')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'app/book/[slug]/booking-form.tsx'

          if git diff --cached --quiet; then
            echo "O formulário já estava atualizado."
            exit 0
          fi

          git commit -m "fix: usar rota isolada no agendamento público"
          git push
